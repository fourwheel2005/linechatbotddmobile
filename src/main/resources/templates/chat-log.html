<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chat Log - DD Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .chat-container {
            height: 60vh;
            overflow-y: auto;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 20px;
        }
        /* กล่องข้อความทั่วไป */
        .chat-bubble {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            clear: both;
            word-wrap: break-word;
            white-space: pre-line; /* รองรับการขึ้นบรรทัดใหม่จาก JSON */
        }
        /* ข้อความฝั่งลูกค้า (ซ้าย) */
        .bubble-user {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            color: #333;
            float: left;
            border-bottom-left-radius: 2px;
        }
        /* ข้อความฝั่ง AI / Admin (ขวา) */
        .bubble-assistant {
            background-color: #0084ff;
            color: white;
            float: right;
            border-bottom-right-radius: 2px;
        }
        /* ข้อความระบบ (System Prompt) จะซ่อนหรือแสดงตัวเล็กๆ ตรงกลาง */
        .bubble-system {
            background-color: #ffc107;
            color: #000;
            float: none;
            margin: 10px auto;
            display: table;
            font-size: 0.85em;
            text-align: center;
            opacity: 0.8;
        }
        /* เคลียร์ float เพื่อให้เรียงบรรทัดถูกต้อง */
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-4 mb-5">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="fas fa-comments text-primary"></i> ประวัติการสนทนา</h4>
        <a href="/admin/dashboard" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> กลับหน้าหลัก
        </a>
    </div>

    <div class="card mb-3 shadow-sm border-0">
        <div class="card-body">
            <strong>UserID:</strong> <span th:text="${botUser.userId}"></span> |
            <strong>สถานะ:</strong> <span class="badge bg-primary" th:text="${botUser.currentStatus}"></span> |
            <strong>กำลังให้คนตอบ?:</strong> <span th:text="${botUser.humanMode ? 'ใช่ (แอดมินดูแล)' : 'ไม่ใช่ (AI ดูแล)'}"></span>
        </div>
    </div>

    <div class="chat-container shadow-sm clearfix" id="chatBox">

        <div th:each="msg : ${chatHistory}">

            <div th:if="${msg.role == 'system'}" class="chat-bubble bubble-system">
                <i class="fas fa-robot"></i> <strong>System:</strong> <span th:text="${msg.content}"></span>
            </div>

            <div th:if="${msg.role == 'user'}" class="chat-bubble bubble-user">
                <strong class="text-muted" style="font-size: 0.8em;">ลูกค้า</strong><br>
                <span th:text="${msg.content}"></span>
            </div>

            <div th:if="${msg.role == 'assistant'}" class="chat-bubble bubble-assistant">
                <strong style="font-size: 0.8em; color: #e0e0e0;">แอดมิน / AI</strong><br>
                <span th:text="${msg.content}"></span>
            </div>

            <div class="clearfix"></div>
        </div>

        <div th:if="${chatHistory.empty}" class="text-center text-muted mt-5">
            ยังไม่มีประวัติการสนทนา
        </div>

    </div>
</div>

<script>
    window.onload = function() {
        var chatBox = document.getElementById("chatBox");
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>

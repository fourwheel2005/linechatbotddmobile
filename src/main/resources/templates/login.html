<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ - DD Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; max-width: 450px; width: 100%; }
        .auth-header { background: linear-gradient(135deg, #0d6efd, #0dcaf0); padding: 30px 20px; text-align: center; color: white; }
        .auth-body { padding: 40px 30px; background: white; }
        .form-control { border-radius: 8px; padding: 12px 15px; background-color: #f8f9fa; border: 1px solid #e9ecef; }
        .form-control:focus { box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15); background-color: white; }
        .input-group-text { border-radius: 8px 0 0 8px; background-color: #f8f9fa; border: 1px solid #e9ecef; border-right: none; color: #6c757d; }
        .form-control { border-left: none; }
        .btn-primary { border-radius: 8px; padding: 12px; font-weight: 600; background: linear-gradient(135deg, #0d6efd, #0b5ed7); border: none; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2); transition: all 0.2s; }
    </style>
</head>
<body>

<div class="container">
    <div class="auth-card mx-auto">
        <div class="auth-header">
            <i class="fas fa-mobile-alt fs-1 mb-2"></i>
            <h3 class="fw-bold mb-0">DD Mobile</h3>
            <p class="mb-0 text-white-50">Admin Back-office</p>
        </div>
        <div class="auth-body">

            <h5 class="fw-bold text-center mb-4 text-dark">เข้าสู่ระบบ (Login)</h5>

            <div th:if="${param.error}" class="alert alert-danger rounded-3 text-center" style="font-size: 0.9rem;">
                <i class="fas fa-exclamation-circle"></i> ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง!
            </div>
            <div th:if="${param.logout}" class="alert alert-success rounded-3 text-center" style="font-size: 0.9rem;">
                <i class="fas fa-check-circle"></i> ออกจากระบบเรียบร้อยแล้ว
            </div>
            <div th:if="${param.registered}" class="alert alert-info rounded-3 text-center" style="font-size: 0.9rem;">
                <i class="fas fa-user-check"></i> สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบ
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold" style="font-size: 0.85rem;">ชื่อผู้ใช้งาน (Username)</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="กรอกชื่อผู้ใช้งาน" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted fw-bold" style="font-size: 0.85rem;">รหัสผ่าน (Password)</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="กรอกรหัสผ่าน" required>
                    </div>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-lg">
                        เข้าสู่ระบบ <i class="fas fa-sign-in-alt ms-1"></i>
                    </button>
                </div>
            </form>

            <div class="text-center mt-4">
                <span class="text-muted" style="font-size: 0.9rem;">ยังไม่มีบัญชีแอดมิน?
                    <a th:href="@{/register}" class="text-primary fw-bold text-decoration-none">ลงทะเบียนที่นี่</a>
                </span>
            </div>

        </div>
    </div>
</div>

</body>
</html>

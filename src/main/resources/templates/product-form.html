<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ข้อมูลสินค้า - DD Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f0f2f5;
        }
        .form-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: none;
            overflow: hidden;
            max-width: 800px;
            margin: auto;
        }
        .form-header {
            background: linear-gradient(135deg, #FF6B6B 0%, #556270 100%); /* สีโทนแดง-เทาเข้ม ดูพรีเมียม */
            color: white;
            padding: 25px;
            text-align: center;
        }
        .form-label {
            font-weight: 500;
            color: #495057;
        }
        .form-control:focus {
            border-color: #FF6B6B;
            box-shadow: 0 0 0 0.25rem rgba(255, 107, 107, 0.25);
        }
        .btn-save {
            background: linear-gradient(45deg, #2193b0, #6dd5ed);
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(33, 147, 176, 0.3);
            transition: all 0.3s;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(33, 147, 176, 0.4);
            color: white;
        }
        .btn-cancel {
            border-radius: 50px;
            padding: 10px 30px;
        }
    </style>
</head>
<body class="py-5">
<div class="container">
    <div class="form-card">
        <div class="form-header">
            <h3 class="m-0"><i class="bi bi-pencil-square me-2"></i>ข้อมูลสินค้า</h3>
            <p class="mb-0 opacity-75 small">กรอกรายละเอียดสินค้าเพื่อนำไปแสดงผลใน Chatbot</p>
        </div>

        <div class="p-5">
            <form action="#" th:action="@{/admin/products/save}" th:object="${product}" method="POST">

                <input type="hidden" th:field="*{id}" />

                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-phone me-1 text-secondary"></i> ชื่อสินค้า</label>
                        <input type="text" th:field="*{name}" class="form-control form-control-lg" placeholder="เช่น iPhone 15 Pro" required />
                    </div>

                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-tags me-1 text-secondary"></i> หมวดหมู่</label>
                        <input type="text" th:field="*{category}" class="form-control form-control-lg" placeholder="เช่น มือถือ, อุปกรณ์เสริม" required />
                    </div>

                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-currency-dollar me-1 text-secondary"></i> ราคา (บาท)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white">฿</span>
                            <input type="number" step="0.01" th:field="*{price}" class="form-control form-control-lg" placeholder="0.00" required />
                        </div>
                    </div>

                    <div class="col-md-6 d-flex align-items-center">
                        <div class="form-check form-switch mt-4 ms-2">
                            <input class="form-check-input" type="checkbox" role="switch" id="stockSwitch" th:field="*{inStock}" style="width: 3em; height: 1.5em;">
                            <label class="form-check-label ms-2 mt-1 fw-bold text-success" for="stockSwitch">มีสินค้าพร้อมขาย</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label"><i class="bi bi-card-text me-1 text-secondary"></i> รายละเอียดสินค้า</label>
                        <textarea th:field="*{description}" class="form-control" rows="3" placeholder="รายละเอียดจุดเด่น สเปคคร่าวๆ"></textarea>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-palette me-1 text-secondary"></i> สีที่มี</label>
                        <input type="text" th:field="*{colors}" class="form-control" placeholder="เช่น ดำ, ขาว, ไทเทเนียม" />
                        <div class="form-text">ใช้เครื่องหมายจุลภาค (,) คั่นระหว่างสี</div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-search me-1 text-secondary"></i> Keywords (สำหรับ AI)</label>
                        <input type="text" th:field="*{keywords}" class="form-control" placeholder="เช่น iphone, 15, ไอโฟน" />
                        <div class="form-text">คำค้นหาที่ลูกค้าอาจจะพิมพ์มาถาม</div>
                    </div>
                </div>

                <hr class="my-4 text-muted opacity-25">

                <div class="d-flex justify-content-center gap-3">
                    <a href="/admin/products" class="btn btn-light btn-cancel border">
                        <i class="bi bi-arrow-left me-1"></i> ยกเลิก
                    </a>
                    <button type="submit" class="btn btn-save">
                        <i class="bi bi-save me-1"></i> บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>

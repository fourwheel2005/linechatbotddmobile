<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ฟอร์มสินค้า</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h2>ข้อมูลสินค้า</h2>
<form action="#" th:action="@{/admin/products/save}" th:object="${product}" method="POST">

    <input type="hidden" th:field="*{id}" />

    <div class="mb-3">
        <label>ชื่อสินค้า</label>
        <input type="text" th:field="*{name}" class="form-control" required />
    </div>

    <div class="mb-3">
        <label>หมวดหมู่ (มือถือ, อุปกรณ์เสริม)</label>
        <input type="text" th:field="*{category}" class="form-control" required />
    </div>

    <div class="mb-3">
        <label>ราคา</label>
        <input type="number" step="0.01" th:field="*{price}" class="form-control" required />
    </div>

    <div class="mb-3">
        <label>รายละเอียด</label>
        <textarea th:field="*{description}" class="form-control"></textarea>
    </div>

    <div class="mb-3">
        <label>สี (คั่นด้วยคอมม่า)</label>
        <input type="text" th:field="*{colors}" class="form-control" placeholder="ดำ,ขาว,แดง" />
    </div>

    <div class="mb-3">
        <label>Keywords (สำหรับ AI ค้นหา)</label>
        <input type="text" th:field="*{keywords}" class="form-control" placeholder="iphone,15,ไอโฟน" />
    </div>

    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" th:field="*{inStock}" />
        <label class="form-check-label">มีสินค้าในสต็อก</label>
    </div>

    <button type="submit" class="btn btn-success">บันทึก</button>
    <a href="/admin/products" class="btn btn-secondary">ยกเลิก</a>
</form>
</body>
</html>

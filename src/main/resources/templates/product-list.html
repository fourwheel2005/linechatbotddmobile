<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>จัดการสินค้า DD Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h2 class="mb-4">จัดการสต็อกสินค้า (Admin)</h2>

<a href="/admin/products/new" class="btn btn-primary mb-3">+ เพิ่มสินค้าใหม่</a>

<table class="table table-bordered table-striped">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>ชื่อสินค้า</th>
        <th>หมวดหมู่</th>
        <th>ราคา</th>
        <th>สถานะ</th>
        <th>จัดการ</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="product : ${products}">
        <td th:text="${product.id}"></td>
        <td th:text="${product.name}"></td>
        <td th:text="${product.category}"></td>
        <td th:text="${product.price}"></td>
        <td>
            <span th:if="${product.inStock}" class="badge bg-success">มีของ</span>
            <span th:unless="${product.inStock}" class="badge bg-danger">หมด</span>
        </td>
        <td>
            <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm">แก้ไข</a>
            <a th:href="@{/admin/products/delete/{id}(id=${product.id})}" class="btn btn-danger btn-sm" onclick="return confirm('ยืนยันจะลบไหม?')">ลบ</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>จัดการสินค้า DD Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f0f2f5; /* สีพื้นหลังเทาอ่อนสบายตา */
        }
        .main-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); /* เงาฟุ้งๆ */
            border: none;
            overflow: hidden;
        }
        .header-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* ไล่สีม่วง-น้ำเงิน */
            color: white;
            padding: 20px;
        }
        .btn-add-new {
            background: linear-gradient(45deg, #11998e, #38ef7d); /* ปุ่มเขียวไล่สี */
            border: none;
            color: white;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .btn-add-new:hover {
            transform: translateY(-2px); /* ลอยขึ้นเมื่อเอาเมาส์ชี้ */
            color: white;
        }
        .table-hover tbody tr:hover {
            background-color: #f8f9fa;
        }
        .status-badge {
            font-size: 0.85rem;
            padding: 0.5em 0.8em;
            border-radius: 20px;
        }
        .action-btn {
            border-radius: 8px;
            margin: 0 2px;
        }
    </style>
</head>
<body class="py-5">
<div class="container">
    <div class="main-card">
        <div class="header-gradient d-flex justify-content-between align-items-center">
            <h3 class="m-0"><i class="bi bi-box-seam-fill me-2"></i> จัดการสต็อกสินค้า</h3>
            <a href="/admin/products/new" class="btn btn-add-new px-4 py-2">
                <i class="bi bi-plus-lg me-1"></i> เพิ่มสินค้าใหม่
            </a>
        </div>

        <div class="p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr class="text-uppercase text-secondary" style="font-size: 0.85rem;">
                        <th class="py-3">ID</th>
                        <th>ชื่อสินค้า</th>
                        <th>หมวดหมู่</th>
                        <th>ราคา</th>
                        <th>สถานะ</th>
                        <th class="text-end">จัดการ</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="product : ${products}">
                        <td class="fw-bold text-muted" th:text="'#' + ${product.id}"></td>

                        <td>
                            <div class="fw-bold text-dark" th:text="${product.name}"></div>
                        </td>

                        <td>
                            <span class="badge bg-light text-dark border" th:text="${product.category}"></span>
                        </td>

                        <td class="fw-bold text-primary" th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')} + ' ฿'"></td>

                        <td>
                                    <span th:if="${product.inStock}" class="badge bg-success bg-opacity-10 text-success status-badge">
                                        <i class="bi bi-check-circle-fill me-1"></i> มีของ
                                    </span>
                            <span th:unless="${product.inStock}" class="badge bg-danger bg-opacity-10 text-danger status-badge">
                                        <i class="bi bi-x-circle-fill me-1"></i> หมด
                                    </span>
                        </td>

                        <td class="text-end">
                            <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn btn-outline-warning btn-sm action-btn" title="แก้ไข">
                                <i class="bi bi-pencil-fill"></i>
                            </a>
                            <a th:href="@{/admin/products/delete/{id}(id=${product.id})}"
                               class="btn btn-outline-danger btn-sm action-btn"
                               onclick="return confirm('⚠️ ยืนยันที่จะลบสินค้านี้? ข้อมูลจะหายไปถาวรเลยนะครับ')" title="ลบ">
                                <i class="bi bi-trash-fill"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(products)}" class="text-center py-5 text-muted">
                <i class="bi bi-inbox fs-1 d-block mb-3"></i>
                <p>ยังไม่มีสินค้าในระบบ เริ่มต้นด้วยการกดปุ่ม "เพิ่มสินค้าใหม่"</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/linechatbotddmobile}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  # ✅ ย้าย ai มาอยู่ใต้ spring แบบนี้ครับ
  ai:
    openai:
      # ลองใส่ค่า default ไว้กันเหนียวแบบนี้ก่อนก็ได้ครับ
      api-key: ${OPENAI_API_KEY:sk-proj-ใส่คีย์ของคุณตรงนี้}
      chat:
        options:
          model: "gpt-4o-mini"
          temperature: 0.1

line:
  bot:
    channel-token: ${LINE_BOT_CHANNEL_TOKEN}
    channel-secret: ${LINE_BOT_CHANNEL_SECRET}
    handler:
      path: /callback
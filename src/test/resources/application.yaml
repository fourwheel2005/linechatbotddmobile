spring:
  datasource:
    url: jdbc:h2:mem:linechatbotddmobile;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  ai:
    openai:
      api-key: test-key

line:
  bot:
    channel-token: test-token
    channel-secret: test-secret
